name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.lock
      - name: Run test suite
        run: python -m pytest -q --cov=xenalgo --cov-fail-under=90
      - name: Run safety-critical coverage gate
        run: python -m coverage run -m pytest tests/unit/test_risk_engine.py tests/unit/test_order_state_machine.py tests/unit/test_execution_phase_a.py tests/unit/test_reconciler_and_data.py tests/integration/test_phase1_paper_day.py tests/chaos/test_failure_injection.py && python -m coverage report --include="xenalgo/risk.py,xenalgo/execution/*" --fail-under=100
